name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev, dev-v4]
  schedule:
    # Nightly e2e-full — exercises real LLM provider paths (Bailian + OpenRouter).
    # 03:00 UTC ≈ 10:00 ICT, runs after the main dev push window settles.
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    # Postgres service container for integration tests. pgvector/pgvector:pg18
    # matches the local dev image (Makefile uses the same tag on port 5433).
    # Healthcheck blocks the job until PG accepts connections, avoiding
    # first-connection flakiness on cold runner starts.
    services:
      pg:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: goclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # tests/integration/v3_test_helper.go reads TEST_DATABASE_URL and runs
      # migrations once via golang-migrate. Uses port 5432 (CI-clean) vs 5433
      # for local dev (avoids clash with desktop Postgres installs).
      TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/goclaw_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go build ./...
      - run: go build -tags sqliteonly ./...
      - run: go vet ./...
      - name: Grep gate — predefined-only agent kind
        run: |
          set -e
          forbidden_go='agent_type|AgentTypeOpen|AgentTypePredefined|UserPredefinedFile|BOOTSTRAP_PREDEFINED|USER_PREDEFINED'
          forbidden_web='agent_type|agentType'
          # Allowlist:
          #   - internal/http/agents.go + internal/gateway/methods/agents_create.go: payload-rejection probes
          #   - internal/i18n/{keys,catalog_*}.go: error message text
          #   - idx_evo_metrics_agent_type: unrelated index name on agent_evolution_metrics(metric_type)
          go_hits=$(git ls-files 'internal/*.go' 'cmd/*.go' 'pkg/*.go' 'migrations/*.sql' \
            | grep -v '_test\.go$' \
            | xargs grep -nE "$forbidden_go" 2>/dev/null \
            | grep -vE 'internal/http/agents\.go|internal/gateway/methods/agents_create\.go|internal/i18n/(keys|catalog_(en|vi|zh))\.go|idx_evo_metrics_agent_type' || true)
          if [ -n "$go_hits" ]; then
            echo "::error::predefined-only purge regression in Go/SQL:"
            echo "$go_hits"
            exit 1
          fi
          web_hits=$(git ls-files 'ui/web/src/*.ts' 'ui/web/src/*.tsx' 'ui/web/src/*.json' \
            | xargs grep -nE "$forbidden_web" 2>/dev/null || true)
          if [ -n "$web_hits" ]; then
            echo "::error::predefined-only purge regression in ui/web:"
            echo "$web_hits"
            exit 1
          fi
      # -timeout=5m caps each test binary so a deadlocked test fails fast
      # instead of blocking CI for the 10-minute default. Bumped from 90s
      # because real 1s retry backoffs in HTTPHandler and goja memory-bomb
      # sandbox tests push the internal/hooks/handlers binary past 90s
      # under -race -coverpkg=./...  Followup: make handler backoff
      # configurable so tests can use ms-scale delays.
      - name: Unit tests
        run: go test -race -timeout=5m -coverpkg=./... -coverprofile=coverage.out ./...
      # Invariant tests (P0) - tenant isolation, permission enforcement
      # These run against real DB and MUST pass for merge.
      - name: Invariant tests (P0)
        run: go test -race -timeout=90s -tags integration ./tests/invariants/...
      # Contract tests (P1) - API schema validation
      # Skip if no server available (requires CONTRACT_TEST_* env vars).
      - name: Contract tests (P1)
        run: go test -race -timeout=90s -tags integration ./tests/contracts/... || echo "::warning::Contract tests skipped (no server configured)"
        continue-on-error: true
      # Integration suite runs against the `pg` service container above.
      # Longer -timeout=180s because the first test runs migrations from
      # scratch (can take 10-30s on a cold CI runner). Local full suite
      # completes in <3s against a warm DB.
      - name: Integration tests
        run: go test -race -timeout=180s -tags integration ./tests/integration/
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  # e2e-fast — per-PR / per-push lane. Skips real LLM provider calls (-short).
  # Blocks merge on failure. Real PG18+pgvector on port 5435 to mirror local
  # `make test-e2e-short` exactly.
  e2e-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      pg:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: goclaw_v4_e2e
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpass
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U dev -d goclaw_v4_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      GOCLAW_DATABASE_URL: postgres://dev:devpass@localhost:5435/goclaw_v4_e2e?sslmode=disable
      GOCLAW_DB_HOST: localhost
      GOCLAW_DB_PORT: "5435"
      GOCLAW_DB_USER: dev
      GOCLAW_DB_PASSWORD: devpass
      GOCLAW_DB_NAME: goclaw_v4_e2e
      GOCLAW_HOST: 127.0.0.1
      GOCLAW_PORT: "0"
      GOCLAW_LOG_LEVEL: warn
      GOCLAW_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GOCLAW_JWT_SECRET: e2e-ci-jwt-secret-32-byte-minimum-padding-here
      E2E_ROOT_PASSWORD: E2eRootPass!2026
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Enable pgvector + pgcrypto
        run: |
          PGPASSWORD=devpass psql -h localhost -p 5435 -U dev -d goclaw_v4_e2e \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - name: e2e-short (skip real LLM)
        run: go test -tags e2e -short -v -timeout 15m ./tests/e2e/...

  # e2e-full — nightly. Real LLM provider calls via Bailian + OpenRouter.
  # Skipped on PRs; runs on schedule trigger only. Provider keys come from
  # repository secrets; missing-secret cases skip provider-specific subtests
  # rather than failing the whole job.
  e2e-full:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    services:
      pg:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: goclaw_v4_e2e
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpass
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U dev -d goclaw_v4_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      GOCLAW_DATABASE_URL: postgres://dev:devpass@localhost:5435/goclaw_v4_e2e?sslmode=disable
      GOCLAW_DB_HOST: localhost
      GOCLAW_DB_PORT: "5435"
      GOCLAW_DB_USER: dev
      GOCLAW_DB_PASSWORD: devpass
      GOCLAW_DB_NAME: goclaw_v4_e2e
      GOCLAW_HOST: 127.0.0.1
      GOCLAW_PORT: "0"
      GOCLAW_LOG_LEVEL: warn
      GOCLAW_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GOCLAW_JWT_SECRET: e2e-ci-jwt-secret-32-byte-minimum-padding-here
      E2E_ROOT_PASSWORD: E2eRootPass!2026
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_API_BASE: https://openrouter.ai/api/v1
      BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
      BAILIAN_API_BASE: ${{ secrets.BAILIAN_API_BASE }}
      BAILIAN_DEFAULT_MODEL: ${{ secrets.BAILIAN_DEFAULT_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Enable pgvector + pgcrypto
        run: |
          PGPASSWORD=devpass psql -h localhost -p 5435 -U dev -d goclaw_v4_e2e \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - name: e2e-full (with real LLM)
        run: go test -tags e2e -v -timeout 30m ./tests/e2e/...
